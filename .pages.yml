media:
  input: assets/content
  output: /assets/content
  rename: safe
  categories: [image]

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: add {name}"
      update: "content: update {name}"
      delete: "content: remove {name}"

content:
  - name: papers
    label: Research papers
    type: collection
    path: content/papers
    format: json
    filename:
      template: "{fields.slug}.json"
      field: create
    view:
      primary: title
      fields: [title, published]
      search: [title, summary.about, placements.industry]
      sort: [title]
    fields:
      - name: slug
        label: URL slug
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
      - name: title
        label: Paper title
        type: string
        required: true
      - name: published
        label: Show on website
        type: boolean
        required: true
      - name: source_url
        label: Original listing URL
        type: string
      - name: paper_url
        label: Full paper URL
        type: string
      - name: summary
        label: Plain-language summary
        type: object
        fields:
          - name: about
            label: What it is about
            type: text
          - name: audience
            label: Who it is for
            type: text
          - name: method
            label: How it was studied
            type: text
          - name: insights
            label: What it found
            type: text
      - name: placements
        label: Industry cards
        type: object
        required: true
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{industry} — position {order}"
        fields:
          - name: industry
            label: Industry
            type: select
            required: true
            options:
              values:
                - agriculture
                - construction
                - energy
                - financial-services
                - healthcare
                - logistics
                - manufacturing
                - public-sector
                - retail
                - technology
                - textiles
                - trade
          - name: order
            label: Card position
            type: number
            required: true
          - name: category
            label: Category label
            type: string
          - name: image
            label: Uploaded card image
            type: image
          - name: image_url
            label: Existing external image URL
            type: string
            description: Used until an uploaded image is selected.

  - name: people
    label: Team and advisors
    type: collection
    path: content/people
    format: json
    filename:
      template: "{fields.slug}.json"
      field: create
    view:
      primary: name
      fields: [name, group, role, published]
      search: [name, role, group]
      sort: [group, order, name]
    fields:
      - name: slug
        label: Record slug
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
      - name: name
        label: Name
        type: string
        required: true
      - name: group
        label: Directory
        type: select
        required: true
        options:
          values:
            - name: core
              label: Core team
            - name: distinguished
              label: Distinguished advisors
            - name: advisors
              label: Advisors
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Show on website
        type: boolean
        required: true
      - name: role
        label: Title or role
        type: string
      - name: bio
        label: Short bio
        type: text
      - name: image
        label: Uploaded headshot
        type: image
      - name: image_url
        label: Existing external image URL
        type: string
        description: Used until an uploaded headshot is selected.
      - name: linkedin_url
        label: LinkedIn URL
        type: string

  - name: industries
    label: Industries
    type: collection
    path: content/industries
    format: json
    filename:
      template: "{fields.slug}.json"
      field: create
    view:
      primary: name
      fields: [name, order, published]
      search: [name, summary]
      sort: [order, name]
    fields:
      - name: slug
        label: URL slug
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
      - name: name
        label: Industry name
        type: string
        required: true
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Show on website
        type: boolean
        required: true
      - name: summary
        label: Industry summary
        type: text
        required: true
      - name: approach_points
        label: Approach points
        type: string
        list:
          min: 1
      - name: icon_svg
        label: Icon SVG paths
        type: code
      - name: image
        label: Uploaded industry image
        type: image
      - name: image_url
        label: Existing industry image URL
        type: string
      - name: image_alt
        label: Industry image description
        type: string
      - name: home_image
        label: Uploaded homepage image
        type: image
      - name: home_image_url
        label: Existing homepage image URL
        type: string
      - name: home_image_alt
        label: Homepage image description
        type: string
      - name: related_study
        label: Related Spotlight study
        type: object
        fields:
          - name: tag
            type: string
          - name: title
            type: string
          - name: sum
            label: Summary
            type: text
          - name: href
            label: Link
            type: string

  # Each page below is a standalone file (not a repeating collection) because every
  # page has its own fixed set of text fields, not a uniform record shape. Add a new
  # "type: file" entry here (with a matching content/pages/<slug>.json) for any new
  # page that needs CMS-editable text.
  - name: home
    label: "Website Pages: Home"
    type: file
    file: content/pages/home.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: "Hero heading (before the typewriter word)", type: string }
      - { name: hero_sub, label: Hero subheading, type: text }
      - { name: hero_button_primary, label: "Hero button: primary", type: string }
      - { name: hero_button_secondary, label: "Hero button: secondary", type: string }
      - { name: stat_1_number, label: "Stat 1: number", type: string }
      - { name: stat_1_label, label: "Stat 1: label", type: string }
      - { name: stat_2_number, label: "Stat 2: number", type: string }
      - { name: stat_2_label, label: "Stat 2: label", type: string }
      - { name: stat_3_number, label: "Stat 3: number", type: string }
      - { name: stat_3_label, label: "Stat 3: label", type: string }
      - { name: clients_label, label: Clients marquee label, type: string }
      - { name: about_heading, label: "About preview: heading", type: string }
      - { name: about_lede, label: "About preview: lede", type: text }
      - { name: about_paragraph, label: "About preview: paragraph", type: text }
      - { name: about_button, label: "About preview: button", type: string }
      - { name: about_figure_caption, label: "About preview: figure caption", type: string }
      - { name: about_figure_sub, label: "About preview: figure subtext", type: text }
      - { name: capabilities_heading, label: "Capabilities preview: heading", type: string }
      - { name: capabilities_intro, label: "Capabilities preview: intro", type: text }
      - { name: industries_heading, label: "Industries preview: heading", type: string }
      - { name: industries_intro, label: "Industries preview: intro", type: text }
      - { name: industries_button, label: "Industries preview: button", type: string }
      - { name: spotlight_heading, label: "Spotlight preview: heading", type: string }
      - { name: spotlight_intro, label: "Spotlight preview: intro", type: text }
      - { name: cta_heading, label: "Closing CTA: heading", type: string }
      - { name: cta_text, label: "Closing CTA: text", type: text }
      - { name: cta_button, label: "Closing CTA: button", type: string }

  - name: about-page
    label: "Website Pages: About"
    type: file
    file: content/pages/about.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_lead, label: Hero lead, type: text }
      - { name: story_heading, label: "Our story: heading", type: string }
      - { name: story_lede, label: "Our story: lede", type: text }
      - { name: story_paragraph_1, label: "Our story: paragraph 1", type: text }
      - { name: story_paragraph_2, label: "Our story: paragraph 2", type: text }
      - { name: figure_caption, label: Figure caption, type: string }
      - { name: figure_sub, label: Figure subtext, type: text }
      - { name: people_heading, label: "Our people: heading", type: string }
      - { name: people_intro, label: "Our people: intro", type: text }
      - { name: clients_heading, label: "Clients: heading", type: string }
      - { name: clients_intro, label: "Clients: intro", type: text }
      - { name: partners_heading, label: "Partners: heading", type: string }
      - { name: partners_intro, label: "Partners: intro", type: text }
      - { name: cta_heading, label: "Closing CTA: heading", type: string }
      - { name: cta_text, label: "Closing CTA: text", type: text }
      - { name: cta_button, label: "Closing CTA: button", type: string }

  - name: capabilities-page
    label: "Website Pages: Capabilities"
    type: file
    file: content/pages/capabilities.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_lead, label: Hero lead, type: text }
      - { name: deliverables_heading, label: "Deliverables: heading", type: string }
      - { name: cta_heading, label: "Closing CTA: heading", type: string }
      - { name: cta_text, label: "Closing CTA: text", type: text }
      - { name: cta_button, label: "Closing CTA: button", type: string }
    description: >-
      The 4 capability tabs and 4 deliverable cards stay hardcoded in
      capabilities.html — they change rarely and are easier to edit directly
      in the HTML than through a form.

  - name: spotlight-page
    label: "Website Pages: Spotlight"
    type: file
    file: content/pages/spotlight.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_lead, label: Hero lead, type: text }
      - { name: cta_heading, label: "Closing CTA: heading", type: string }
      - { name: cta_text, label: "Closing CTA: text", type: text }
      - { name: cta_button, label: "Closing CTA: button", type: string }

  - name: contact-page
    label: "Website Pages: Contact"
    type: file
    file: content/pages/contact.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_lead, label: Hero lead, type: text }
      - { name: contact_heading, label: "Contact section: heading", type: string }
      - { name: contact_intro, label: "Contact section: intro", type: text }
      - { name: location_country, label: "Office: country", type: string }
      - { name: location_city, label: "Office: city", type: string }
      - { name: location_address, label: "Office: address (may include <br> line breaks)", type: text }
      - { name: location_phone_display, label: "Office: displayed phone number", type: string, description: "Display text only — does not change the tel: link itself." }
      - { name: location_email_display, label: "Office: displayed email address", type: string, description: "Display text only — does not change the mailto: link or the form's delivery address." }
      - { name: form_note_response, label: "Form note: response time", type: string }
      - { name: submit_button, label: "Form: submit button text", type: string }
      - { name: form_note_privacy, label: "Form note: privacy", type: string }

  - name: privacy-page
    label: "Website Pages: Privacy Policy"
    type: file
    file: content/pages/privacy.json
    fields:
      - { name: slug, type: string, required: true }
      - { name: published, label: Show on website, type: boolean, required: true }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_lead, label: Hero lead, type: text }
      - { name: section_1_heading, label: "Section 1: heading", type: string }
      - { name: section_1_body, label: "Section 1: body", type: text }
      - { name: section_2_heading, label: "Section 2: heading", type: string }
      - { name: section_2_body, label: "Section 2: body", type: text }
      - { name: section_3_heading, label: "Section 3: heading", type: string }
      - { name: section_3_body, label: "Section 3: body (may include HTML links)", type: text }
      - { name: section_4_heading, label: "Section 4: heading", type: string }
      - { name: section_4_body, label: "Section 4: body", type: text }
      - { name: section_5_heading, label: "Section 5: heading", type: string }
      - { name: section_5_body, label: "Section 5: body", type: text }
      - { name: section_6_heading, label: "Section 6: heading", type: string }
      - { name: section_6_body, label: "Section 6: body (may include HTML links)", type: text }

  - name: global-settings
    label: "Website Pages: Global (footer)"
    type: file
    file: content/settings/global.json
    fields:
      - { name: footer_tagline, label: Footer tagline, type: text }
      - { name: footer_email, label: "Footer contact email (display text)", type: string }
      - { name: copyright_line, label: Copyright line, type: string }
